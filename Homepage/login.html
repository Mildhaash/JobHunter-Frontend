<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — JobHunter</title>
  <link rel="stylesheet" href="homepage.css" />
  <script src="theme.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="home.html" class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name">Job<span>Hunter</span></span>
      </a>
      <div class="header-actions">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 14.5A8.5 8.5 0 119.5 4a7 7 0 0010.5 10.5z"/></svg>
        </button>
        <a href="home.html" class="link-login">Home</a>
        <a href="signup.html" class="btn btn-primary">Sign up</a>
      </div>
    </div>
  </header>

  <main>
    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtitle">Enter your credentials to access your account</p>

        <div class="oauth-row">
          <button type="button" class="btn-oauth">
            <svg class="oauth-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#4285F4" d="M21.805 10.023H12v3.955h5.39c-.234 1.26-.94 2.33-2 3.05l3.24 2.51c1.89-1.74 2.98-4.3 2.98-7.33 0-.7-.06-1.37-.18-2.03z"/>
              <path fill="#34A853" d="M12 22c2.7 0 4.96-.89 6.61-2.43l-3.24-2.51c-.9.61-2.05.97-3.37.97-2.59 0-4.79-1.75-5.58-4.1H2.98v2.58A9.99 9.99 0 0 0 12 22z"/>
              <path fill="#FBBC05" d="M6.42 13.93A5.97 5.97 0 0 1 6.42 10.07V7.49H2.98A9.98 9.98 0 0 0 2 12c0 1.61.39 3.13 1.08 4.49l3.34-2.56z"/>
              <path fill="#EA4335" d="M12 6.04c1.46 0 2.77.5 3.8 1.48l2.85-2.85C16.96 2.99 14.7 2 12 2A9.99 9.99 0 0 0 2.98 7.49l3.44 2.58C6.79 7.79 9 6.04 12 6.04z"/>
            </svg>
            Google
          </button>
          <button type="button" class="btn-oauth">
            <svg class="oauth-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.66-.22.66-.48 0-.24-.01-.87-.01-1.7-2.78.61-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.9 1.54 2.34 1.1 2.91.84.09-.65.35-1.1.64-1.35-2.22-.25-4.55-1.11-4.55-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.84c.85.01 1.71.12 2.51.35 1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.69-4.57 4.94.36.31.68.92.68 1.86 0 1.34-.01 2.42-.01 2.75 0 .27.16.58.67.48A10.01 10.01 0 0 0 22 12c0-5.52-4.48-10-10-10z"/>
            </svg>
            GitHub
          </button>
        </div>

        <div class="divider"><span>OR CONTINUE WITH EMAIL</span></div>

        <form id="loginForm" novalidate>
          <div class="auth-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="name@company.com" required />
          </div>
          <div class="auth-field">
            <div class="auth-field-head">
              <label for="password">Password</label>
              <a href="#" class="forgot">Forgot password?</a>
            </div>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Sign in</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-brand">
      <span class="brand-mark"></span>
      <span class="brand-name">Job<span>Hunter</span></span>
    </div>
    <p class="footer-tagline">
      The enterprise-grade job tracker built to automate your career journey using generative AI.
    </p>
  </footer>
  <script src="auth.js"></script>
</body>
</html>
