<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — JobHunter</title>
  <link rel="stylesheet" href="homepage.css" />
  <script src="theme.js"></script>
  <script src="../shared/loading.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="home.html" class="brand">
        <span class="brand-mark"></span>
        <span class="brand-name">Job<span>Hunter</span></span>
      </a>
      <div class="header-actions">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 14.5A8.5 8.5 0 119.5 4a7 7 0 0010.5 10.5z"/></svg>
        </button>
        <a href="home.html" class="link-login">Home</a>
        <a href="login.html" class="btn btn-outline">Log in</a>
      </div>
    </div>
  </header>

  <main>
    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Set new password</h1>
        <p class="auth-subtitle">Enter your new password below</p>

        <form id="resetForm" novalidate style="display:none;">
          <div class="auth-field">
            <label for="password">New password</label>
            <input type="password" id="password" name="password" placeholder="At least 6 characters" required />
          </div>
          <div class="auth-field">
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block">Reset password</button>
        </form>

        <p id="invalidMsg" class="auth-switch" style="display:none;color:#e74c3c;"></p>
        <p id="successMsg" class="auth-switch" style="display:none;color:#27ae60;font-weight:600;"></p>

        <p class="auth-switch"><a href="login.html">Back to login</a></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-brand">
      <span class="brand-mark"></span>
      <span class="brand-name">Job<span>Hunter</span></span>
    </div>
    <p class="footer-tagline">
      The enterprise-grade job tracker built to automate your career journey using generative AI.
    </p>
  </footer>
  <script src="resetPassword.js"></script>
</body>
</html>
