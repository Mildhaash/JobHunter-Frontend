<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applications — JobHunter</title>
  <link rel="stylesheet" href="dashboard.css" />
  <script>
    (function() {
      var t = localStorage.getItem("jobtracker-theme");
      if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>

  <header class="site-header" id="siteHeader"></header>

  <main>
    <section class="page-head">
      <div class="page-head-text">
        <h1>All Applications</h1>
        <p>Managing <strong id="headCount">0</strong> active tracking entries</p>
      </div>
      <button class="btn btn-primary" id="addBtn" type="button">+ Add</button>
    </section>

    <section class="controls-section" aria-label="Filter and search applications">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <label for="searchInput" class="sr-only">Search by company or role</label>
        <input type="search" id="searchInput" placeholder="Search company, role..." />
      </div>
      <label for="statusFilter" class="sr-only">Filter by status</label>
      <select id="statusFilter">
        <option value="All">All Statuses</option>
        <option value="Applied">Applied</option>
        <option value="Interview">Interview</option>
        <option value="Offer">Offer</option>
        <option value="Rejected">Rejected</option>
      </select>
    </section>

    <section class="table-section" aria-label="Your applications">
      <div class="table-scroll">
        <table class="apps-table">
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Location</th>
              <th>Date</th>
              <th>Status</th>
              <th>Progress</th>
              <th class="th-menu"><span class="sr-only">Actions</span></th>
            </tr>
          </thead>
          <tbody id="appsTableBody"></tbody>
        </table>
      </div>
      <div id="appsCards" class="apps-cards"></div>
      <p id="emptyState" class="empty-state" hidden>
        No applications match your filters. Try a different search or add a new application.
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Built with HTML, CSS &amp; JavaScript — no frameworks.</p>
  </footer>

  <!-- Add / edit modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="false" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 id="modalTitle">Add application</h2>
        <button class="modal-close" id="modalClose" type="button" aria-label="Close">&times;</button>
      </div>
      <form id="applicationForm" novalidate>
        <input type="hidden" id="appId" />
        <div class="field">
          <label for="companyInput">Company</label>
          <input type="text" id="companyInput" name="company" required />
          <span class="error-text" id="companyError" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="roleInput">Role</label>
          <input type="text" id="roleInput" name="role" required />
          <span class="error-text" id="roleError" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="locationInput">Location</label>
          <input type="text" id="locationInput" name="location" required />
          <span class="error-text" id="locationError" aria-live="polite"></span>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="dateInput">Date applied</label>
            <input type="date" id="dateInput" name="date" required />
            <span class="error-text" id="dateError" aria-live="polite"></span>
          </div>

          <div class="field">
            <label for="statusInput">Status</label>
            <select id="statusInput" name="status">
              <option value="Applied">Applied</option>
              <option value="Interview">Interview</option>
              <option value="Offer">Offer</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="modalCancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modalSubmit">Add application</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../shared/loading.js"></script>
  <script src="data.js"></script>
  <script src="nav.js"></script>
  <script src="applications.js"></script>
</body>
</html>
